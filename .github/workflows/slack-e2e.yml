name: Slack E2E

on:
  workflow_dispatch:

jobs:
  slack-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Slack E2E
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAMA_SLACK_APP_TOKEN: ${{ secrets.MAMA_SLACK_APP_TOKEN }}
          MAMA_SLACK_BOT_TOKEN: ${{ secrets.MAMA_SLACK_BOT_TOKEN }}
          SLACK_QA_USER_TOKEN: ${{ secrets.SLACK_QA_USER_TOKEN }}
          SLACK_QA_CHANNEL_ID: ${{ secrets.SLACK_QA_CHANNEL_ID || vars.SLACK_QA_CHANNEL_ID }}
          SLACK_QA_MAMA_BOT_USER_ID: ${{ secrets.SLACK_QA_MAMA_BOT_USER_ID || vars.SLACK_QA_MAMA_BOT_USER_ID }}
        run: |
          set -euo pipefail

          LOG_FILE="$RUNNER_TEMP/mama-slack-e2e.log"
          STATE_DIR="$RUNNER_TEMP/mama-state"

          node dist/main.js --onboard --state-dir "$STATE_DIR"
          node dist/main.js --state-dir "$STATE_DIR" "$GITHUB_WORKSPACE" >"$LOG_FILE" 2>&1 &
          MAMA_PID=$!

          cleanup() {
            kill "$MAMA_PID" 2>/dev/null || true
            echo "----- mama log -----"
            cat "$LOG_FILE" || true
          }
          trap cleanup EXIT

          connected=0
          for _ in $(seq 1 60); do
            if grep -q "connected to Slack" "$LOG_FILE"; then
              connected=1
              break
            fi
            if ! kill -0 "$MAMA_PID" 2>/dev/null; then
              echo "mama exited before connecting"
              exit 1
            fi
            sleep 1
          done

          if [ "$connected" != "1" ]; then
            echo "Timed out waiting for mama to connect to Slack"
            exit 1
          fi

          npm run test:e2e:slack
