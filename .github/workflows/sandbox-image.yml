name: Publish sandbox image

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - docker/mama-sandbox.Dockerfile
      - package.json
      - .github/workflows/sandbox-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/mama-sandbox"
          version=$(node -p "require('./package.json').version")
          short_sha="${GITHUB_SHA::7}"

          tags=(
            "${image}:sha-${short_sha}"
          )

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tags+=(
              "${image}:${version}"
              "${image}:tools"
            )

            if [[ "${version}" == *-* ]]; then
              tags+=("${image}:beta")
            else
              tags+=("${image}:latest")
            fi
          else
            tags+=("${image}:edge")
          fi

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mama-sandbox.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=mama sandbox
            org.opencontainers.image.description=Prebuilt sandbox image for mama managed per-user containers
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published tags
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "### Published sandbox image" >> "${GITHUB_STEP_SUMMARY}"
          while IFS= read -r tag; do
            echo "- \`${tag}\`" >> "${GITHUB_STEP_SUMMARY}"
          done <<< "${TAGS}"
